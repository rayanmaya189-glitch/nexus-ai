syntax = "proto3";

package rag;

option go_package = "github.com/aeroxe/nexus-backend/api/proto/rag;ragpb";

import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";

// ============================================================
// RAG Service - Document Management, Vector Search, RAG Queries
// ============================================================

service RAGService {
  // Documents
  rpc GetDocument(GetDocumentRequest) returns (Document);
  rpc ListDocuments(ListDocumentsRequest) returns (ListDocumentsResponse);
  rpc CreateDocument(CreateDocumentRequest) returns (Document);
  rpc UpdateDocument(UpdateDocumentRequest) returns (Document);
  rpc DeleteDocument(DeleteDocumentRequest) returns (google.protobuf.Empty);

  // Chunks
  rpc GetDocumentChunks(GetDocumentChunksRequest) returns (ListDocumentChunksResponse);
  rpc IngestDocument(IngestDocumentRequest) returns (IngestDocumentResponse);

  // Search
  rpc VectorSearch(VectorSearchRequest) returns (VectorSearchResponse);

  // RAG Query
  rpc RAGQuery(RAGQueryRequest) returns (RAGQueryResponse);

  // Document Sets
  rpc GetDocumentSet(GetDocumentSetRequest) returns (DocumentSet);
  rpc ListDocumentSets(ListDocumentSetsRequest) returns (ListDocumentSetsResponse);
  rpc CreateDocumentSet(CreateDocumentSetRequest) returns (DocumentSet);
  rpc DeleteDocumentSet(DeleteDocumentSetRequest) returns (google.protobuf.Empty);
}

// ============================================================
// Messages
// ============================================================

message Document {
  int64 id = 1;
  int64 tenant_id = 2;
  string title = 3;
  string content = 4;
  string doc_type = 5;
  string metadata = 6;
  string status = 7;
  int32 chunk_count = 8;
  google.protobuf.Timestamp created_at = 9;
  google.protobuf.Timestamp updated_at = 10;
}

message GetDocumentRequest {
  int64 id = 1;
}

message ListDocumentsRequest {
  int64 tenant_id = 1;
  int32 page = 2;
  int32 per_page = 3;
}

message ListDocumentsResponse {
  repeated Document documents = 1;
  int64 total = 2;
}

message CreateDocumentRequest {
  int64 tenant_id = 1;
  string title = 2;
  string content = 3;
  string doc_type = 4;
  string metadata = 5;
}

message UpdateDocumentRequest {
  int64 id = 1;
  string title = 2;
  string content = 3;
  string doc_type = 4;
  string metadata = 5;
  string status = 6;
}

message DeleteDocumentRequest {
  int64 id = 1;
}

message DocumentChunk {
  int64 id = 1;
  int64 document_id = 2;
  int64 tenant_id = 3;
  string content = 4;
  int32 chunk_index = 5;
  bytes embedding = 6;
  string metadata = 7;
  google.protobuf.Timestamp created_at = 8;
}

message GetDocumentChunksRequest {
  int64 document_id = 1;
}

message ListDocumentChunksResponse {
  repeated DocumentChunk chunks = 1;
}

message IngestDocumentRequest {
  int64 tenant_id = 1;
  string title = 2;
  string content = 3;
  string doc_type = 4;
  string metadata = 5;
  int32 chunk_size = 6;
  int32 chunk_overlap = 7;
}

message IngestDocumentResponse {
  int64 document_id = 1;
  int32 chunks_created = 2;
  int32 embeddings_generated = 3;
  double latency_ms = 4;
}

message VectorSearchRequest {
  int64 tenant_id = 1;
  string query = 2;
  int32 top_k = 3;
  string doc_type = 4;
  map<string, string> filters = 5;
}

message VectorSearchResult {
  int64 chunk_id = 1;
  int64 document_id = 2;
  string content = 3;
  double score = 4;
  string metadata = 5;
}

message VectorSearchResponse {
  repeated VectorSearchResult results = 1;
  double latency_ms = 2;
}

message RAGQueryRequest {
  int64 tenant_id = 1;
  int64 user_id = 2;
  string query = 3;
  string model = 4;
  int32 top_k = 5;
  string system_prompt = 6;
  map<string, string> context = 7;
}

message RAGQueryResponse {
  string id = 1;
  string answer = 2;
  repeated VectorSearchResult sources = 3;
  TokenUsage tokens = 4;
  double latency_ms = 5;
}

message TokenUsage {
  int32 prompt_tokens = 1;
  int32 completion_tokens = 2;
  int32 total_tokens = 3;
}

message DocumentSet {
  int64 id = 1;
  int64 tenant_id = 2;
  string name = 3;
  string description = 4;
  string status = 5;
  google.protobuf.Timestamp created_at = 6;
  google.protobuf.Timestamp updated_at = 7;
}

message GetDocumentSetRequest {
  int64 id = 1;
}

message ListDocumentSetsRequest {
  int64 tenant_id = 1;
}

message ListDocumentSetsResponse {
  repeated DocumentSet sets = 1;
}

message CreateDocumentSetRequest {
  int64 tenant_id = 1;
  string name = 2;
  string description = 3;
}

message DeleteDocumentSetRequest {
  int64 id = 1;
}
