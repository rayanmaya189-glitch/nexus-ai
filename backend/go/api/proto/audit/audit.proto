syntax = "proto3";

package audit;

option go_package = "github.com/aeroxe/nexus-backend/api/proto/audit;auditpb";

import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";

// ============================================================
// Audit Service - Audit Logging, Compliance, Search
// ============================================================

service AuditService {
  // Logs
  rpc CreateAuditLog(CreateAuditLogRequest) returns (AuditLog);
  rpc GetAuditLog(GetAuditLogRequest) returns (AuditLog);
  rpc ListAuditLogs(ListAuditLogsRequest) returns (ListAuditLogsResponse);

  // Search
  rpc SearchAuditLogs(SearchAuditLogsRequest) returns (SearchAuditLogsResponse);

  // Stats
  rpc GetAuditStats(GetAuditStatsRequest) returns (AuditStats);

  // Export
  rpc ExportAuditLogs(ExportAuditLogsRequest) returns (ExportAuditLogsResponse);
}

// ============================================================
// Messages
// ============================================================

message AuditLog {
  int64 id = 1;
  int64 tenant_id = 2;
  int64 user_id = 3;
  string action = 4;
  string resource_type = 5;
  string resource_id = 6;
  string details = 7;
  string ip_address = 8;
  string user_agent = 9;
  string status = 10;
  google.protobuf.Timestamp created_at = 11;
}

message CreateAuditLogRequest {
  int64 tenant_id = 1;
  int64 user_id = 2;
  string action = 3;
  string resource_type = 4;
  string resource_id = 5;
  string details = 6;
  string ip_address = 7;
  string user_agent = 8;
  string status = 9;
}

message GetAuditLogRequest {
  int64 id = 1;
}

message ListAuditLogsRequest {
  int64 tenant_id = 1;
  int32 page = 2;
  int32 per_page = 3;
}

message ListAuditLogsResponse {
  repeated AuditLog logs = 1;
  int64 total = 2;
  int32 page = 3;
  int32 per_page = 4;
}

message SearchAuditLogsRequest {
  int64 tenant_id = 1;
  string query = 2;
  string action = 3;
  string resource_type = 4;
  string status = 5;
  google.protobuf.Timestamp start_time = 6;
  google.protobuf.Timestamp end_time = 7;
  int32 page = 8;
  int32 per_page = 9;
}

message SearchAuditLogsResponse {
  repeated AuditLog logs = 1;
  int64 total = 2;
  double latency_ms = 3;
}

message GetAuditStatsRequest {
  int64 tenant_id = 1;
  google.protobuf.Timestamp start_time = 2;
  google.protobuf.Timestamp end_time = 3;
}

message AuditStats {
  int64 total_events = 1;
  int64 failed_events = 2;
  map<string, int64> events_by_action = 3;
  map<string, int64> events_by_resource = 4;
  map<string, int64> events_by_status = 5;
}

message ExportAuditLogsRequest {
  int64 tenant_id = 1;
  string format = 2;
  google.protobuf.Timestamp start_time = 3;
  google.protobuf.Timestamp end_time = 4;
}

message ExportAuditLogsResponse {
  string download_url = 1;
  int64 record_count = 2;
  string expires_at = 3;
}
