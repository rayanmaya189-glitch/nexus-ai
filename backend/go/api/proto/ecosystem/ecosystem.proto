syntax = "proto3";

package ecosystem;

option go_package = "github.com/aeroxe/nexus-backend/api/proto/ecosystem;ecosystempb";

import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";

// ============================================================
// Ecosystem Service - Integrations, MCP Tool Invocation
// ============================================================

service EcosystemService {
  // Integrations
  rpc GetIntegration(GetIntegrationRequest) returns (Integration);
  rpc ListIntegrations(ListIntegrationsRequest) returns (ListIntegrationsResponse);
  rpc CreateIntegration(CreateIntegrationRequest) returns (Integration);
  rpc UpdateIntegration(UpdateIntegrationRequest) returns (Integration);
  rpc DeleteIntegration(DeleteIntegrationRequest) returns (google.protobuf.Empty);

  // MCP Tools
  rpc GetMCPTool(GetMCPToolRequest) returns (MCPTool);
  rpc ListMCPTools(ListMCPToolsRequest) returns (ListMCPToolsResponse);
  rpc CreateMCPTool(CreateMCPToolRequest) returns (MCPTool);
  rpc DeleteMCPTool(DeleteMCPToolRequest) returns (google.protobuf.Empty);

  // Tool Invocation
  rpc InvokeMCPTool(InvokeMCPToolRequest) returns (InvokeMCPToolResponse);

  // Health
  rpc CheckIntegrationHealth(CheckIntegrationHealthRequest) returns (IntegrationHealth);
}

// ============================================================
// Messages
// ============================================================

message Integration {
  int64 id = 1;
  int64 tenant_id = 2;
  string name = 3;
  string type = 4;
  string config = 5;
  string status = 6;
  string credentials_ref = 7;
  google.protobuf.Timestamp created_at = 8;
  google.protobuf.Timestamp updated_at = 9;
}

message GetIntegrationRequest {
  int64 id = 1;
}

message ListIntegrationsRequest {
  int64 tenant_id = 1;
  string type = 2;
}

message ListIntegrationsResponse {
  repeated Integration integrations = 1;
}

message CreateIntegrationRequest {
  int64 tenant_id = 1;
  string name = 2;
  string type = 3;
  string config = 4;
  string credentials_ref = 5;
}

message UpdateIntegrationRequest {
  int64 id = 1;
  string name = 2;
  string config = 3;
  string status = 4;
}

message DeleteIntegrationRequest {
  int64 id = 1;
}

message MCPTool {
  int64 id = 1;
  int64 tenant_id = 2;
  string name = 3;
  string description = 4;
  string input_schema = 5;
  string integration_id = 6;
  string status = 7;
  google.protobuf.Timestamp created_at = 8;
}

message GetMCPToolRequest {
  int64 id = 1;
}

message ListMCPToolsRequest {
  int64 tenant_id = 1;
  string integration_id = 2;
}

message ListMCPToolsResponse {
  repeated MCPTool tools = 1;
}

message CreateMCPToolRequest {
  int64 tenant_id = 1;
  string name = 2;
  string description = 3;
  string input_schema = 4;
  string integration_id = 5;
}

message DeleteMCPToolRequest {
  int64 id = 1;
}

message InvokeMCPToolRequest {
  int64 tool_id = 1;
  string input = 2;
  map<string, string> context = 3;
}

message InvokeMCPToolResponse {
  bool success = 1;
  string output = 2;
  string error = 3;
  double latency_ms = 4;
}

message CheckIntegrationHealthRequest {
  int64 integration_id = 1;
}

message IntegrationHealth {
  int64 integration_id = 1;
  string status = 2;
  string message = 3;
  double latency_ms = 4;
  google.protobuf.Timestamp checked_at = 5;
}
