syntax = "proto3";

package agent;

option go_package = "github.com/aeroxe/nexus-backend/api/proto/agent;agentpb";

import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";

// ============================================================
// Agent Orchestrator - Agent Management, Task Execution
// ============================================================

service AgentOrchestratorService {
  // Agent Management
  rpc GetAgent(GetAgentRequest) returns (Agent);
  rpc ListAgents(ListAgentsRequest) returns (ListAgentsResponse);
  rpc CreateAgent(CreateAgentRequest) returns (Agent);
  rpc UpdateAgent(UpdateAgentRequest) returns (Agent);
  rpc DeleteAgent(DeleteAgentRequest) returns (google.protobuf.Empty);

  // Execution
  rpc ExecuteTask(ExecuteTaskRequest) returns (ExecuteTaskResponse);
  rpc GetExecution(GetExecutionRequest) returns (AgentExecution);
  rpc ListExecutions(ListExecutionsRequest) returns (ListExecutionsResponse);
  rpc CancelExecution(CancelExecutionRequest) returns (google.protobuf.Empty);

  // Steps
  rpc GetExecutionSteps(GetExecutionStepsRequest) returns (ListAgentStepsResponse);
}

// ============================================================
// Messages
// ============================================================

message Agent {
  int64 id = 1;
  int64 tenant_id = 2;
  string name = 3;
  string agent_type = 4;
  string model = 5;
  string system_prompt = 6;
  string capabilities = 7;
  string status = 8;
  google.protobuf.Timestamp created_at = 9;
  google.protobuf.Timestamp updated_at = 10;
}

message GetAgentRequest {
  int64 id = 1;
}

message ListAgentsRequest {
  int64 tenant_id = 1;
  string agent_type = 2;
}

message ListAgentsResponse {
  repeated Agent agents = 1;
}

message CreateAgentRequest {
  int64 tenant_id = 1;
  string name = 2;
  string agent_type = 3;
  string model = 4;
  string system_prompt = 5;
  string capabilities = 6;
}

message UpdateAgentRequest {
  int64 id = 1;
  string name = 2;
  string agent_type = 3;
  string model = 4;
  string system_prompt = 5;
  string capabilities = 6;
  string status = 7;
}

message DeleteAgentRequest {
  int64 id = 1;
}

message ExecuteTaskRequest {
  int64 agent_id = 1;
  int64 tenant_id = 2;
  int64 user_id = 3;
  string task = 4;
  string context = 5;
  map<string, string> metadata = 6;
}

message ExecuteTaskResponse {
  int64 execution_id = 1;
  string status = 2;
  string result = 3;
  int32 tokens_used = 4;
  double latency_ms = 5;
}

message AgentExecution {
  int64 id = 1;
  int64 agent_id = 2;
  int64 tenant_id = 3;
  int64 user_id = 4;
  string task = 5;
  string status = 6;
  string result = 7;
  int32 tokens_used = 8;
  double latency_ms = 9;
  google.protobuf.Timestamp started_at = 10;
  google.protobuf.Timestamp completed_at = 11;
}

message GetExecutionRequest {
  int64 id = 1;
}

message ListExecutionsRequest {
  int64 agent_id = 1;
  int32 page = 2;
  int32 per_page = 3;
}

message ListExecutionsResponse {
  repeated AgentExecution executions = 1;
  int64 total = 2;
}

message CancelExecutionRequest {
  int64 id = 1;
}

message AgentStep {
  int64 id = 1;
  int64 execution_id = 2;
  int32 step_number = 3;
  string agent_type = 4;
  string action = 5;
  string tool_name = 6;
  string tool_params = 7;
  string result = 8;
  string status = 9;
  google.protobuf.Timestamp started_at = 10;
  google.protobuf.Timestamp completed_at = 11;
}

message GetExecutionStepsRequest {
  int64 execution_id = 1;
}

message ListAgentStepsResponse {
  repeated AgentStep steps = 1;
}
