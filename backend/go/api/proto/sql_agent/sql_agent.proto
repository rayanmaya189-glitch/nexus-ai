syntax = "proto3";

package sql_agent;

option go_package = "github.com/aeroxe/nexus-backend/api/proto/sql_agent;sqlagentpb";

import "google/protobuf/timestamp.proto";

// ============================================================
// SQL Agent Service - Natural Language to SQL, Query Execution
// ============================================================

service SQLAgentService {
  // Query Generation
  rpc GenerateSQL(GenerateSQLRequest) returns (GenerateSQLResponse);
  rpc ValidateSQL(ValidateSQLRequest) returns (ValidateSQLResponse);
  rpc ExplainSQL(ExplainSQLRequest) returns (ExplainSQLResponse);

  // Execution
  rpc ExecuteQuery(ExecuteQueryRequest) returns (ExecuteQueryResponse);

  // Schema
  rpc GetSchema(GetSchemaRequest) returns (SchemaResponse);
  rpc ListTables(ListTablesRequest) returns (ListTablesResponse);
  rpc DescribeTable(DescribeTableRequest) returns (TableDescription);

  // History
  rpc GetQueryHistory(GetQueryHistoryRequest) returns (QueryHistoryResponse);
}

// ============================================================
// Messages
// ============================================================

message GenerateSQLRequest {
  int64 tenant_id = 1;
  int64 user_id = 2;
  string natural_language_query = 3;
  string database_context = 4;
  string model = 5;
}

message GenerateSQLResponse {
  string sql = 1;
  string explanation = 2;
  double confidence = 3;
  repeated string suggestions = 4;
  double latency_ms = 5;
}

message ValidateSQLRequest {
  string sql = 1;
  string database_context = 2;
}

message ValidateSQLResponse {
  bool valid = 1;
  repeated string errors = 2;
  repeated string warnings = 3;
  repeated string suggestions = 4;
}

message ExplainSQLRequest {
  string sql = 1;
  string database_context = 2;
}

message ExplainSQLResponse {
  string explanation = 1;
  repeated string steps = 2;
  string estimated_cost = 3;
}

message ExecuteQueryRequest {
  int64 tenant_id = 1;
  int64 user_id = 2;
  string sql = 3;
  int32 max_rows = 4;
  int32 timeout_seconds = 5;
}

message ExecuteQueryResponse {
  repeated string columns = 1;
  repeated QueryRow rows = 2;
  int64 total_rows = 3;
  double execution_time_ms = 4;
  string error = 5;
}

message QueryRow {
  repeated string values = 1;
}

message GetSchemaRequest {
  int64 tenant_id = 1;
  string database_name = 2;
}

message SchemaResponse {
  repeated TableSchema tables = 1;
  int64 total_tables = 2;
}

message ListTablesRequest {
  int64 tenant_id = 1;
}

message ListTablesResponse {
  repeated TableInfo tables = 1;
}

message TableInfo {
  string name = 1;
  string schema = 2;
  int64 row_count = 3;
  string description = 4;
}

message DescribeTableRequest {
  int64 tenant_id = 1;
  string table_name = 2;
}

message TableDescription {
  string table_name = 1;
  repeated ColumnInfo columns = 2;
  repeated IndexInfo indexes = 3;
  string description = 4;
}

message ColumnInfo {
  string name = 1;
  string type = 2;
  bool nullable = 3;
  bool is_primary_key = 4;
  string default_value = 5;
  string description = 6;
}

message IndexInfo {
  string name = 1;
  repeated string columns = 2;
  bool is_unique = 3;
  string type = 4;
}

message TableSchema {
  string table_name = 1;
  repeated ColumnInfo columns = 2;
  string description = 3;
}

message GetQueryHistoryRequest {
  int64 tenant_id = 1;
  int64 user_id = 2;
  int32 limit = 3;
}

message QueryHistoryResponse {
  repeated QueryHistoryEntry entries = 1;
}

message QueryHistoryEntry {
  int64 id = 1;
  string natural_language_query = 2;
  string generated_sql = 3;
  bool was_executed = 4;
  double execution_time_ms = 5;
  google.protobuf.Timestamp created_at = 6;
}
