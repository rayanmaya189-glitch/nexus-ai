syntax = "proto3";

package workflow;

option go_package = "github.com/aeroxe/nexus-backend/api/proto/workflow;workflowpb";

import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";

// ============================================================
// Workflow Service - Workflow Management, Execution
// ============================================================

service WorkflowService {
  // Workflows
  rpc GetWorkflow(GetWorkflowRequest) returns (Workflow);
  rpc ListWorkflows(ListWorkflowsRequest) returns (ListWorkflowsResponse);
  rpc CreateWorkflow(CreateWorkflowRequest) returns (Workflow);
  rpc UpdateWorkflow(UpdateWorkflowRequest) returns (Workflow);
  rpc DeleteWorkflow(DeleteWorkflowRequest) returns (google.protobuf.Empty);

  // Execution
  rpc ExecuteWorkflow(ExecuteWorkflowRequest) returns (ExecuteWorkflowResponse);
  rpc GetWorkflowExecution(GetWorkflowExecutionRequest) returns (WorkflowExecution);
  rpc ListWorkflowExecutions(ListWorkflowExecutionsRequest) returns (ListWorkflowExecutionsResponse);

  // Steps
  rpc GetWorkflowSteps(GetWorkflowStepsRequest) returns (ListWorkflowStepsResponse);
}

// ============================================================
// Messages
// ============================================================

message Workflow {
  int64 id = 1;
  int64 tenant_id = 2;
  string name = 3;
  string description = 4;
  string trigger_type = 5;
  string config = 6;
  string status = 7;
  int32 version = 8;
  google.protobuf.Timestamp created_at = 9;
  google.protobuf.Timestamp updated_at = 10;
}

message GetWorkflowRequest {
  int64 id = 1;
}

message ListWorkflowsRequest {
  int64 tenant_id = 1;
  int32 page = 2;
  int32 per_page = 3;
}

message ListWorkflowsResponse {
  repeated Workflow workflows = 1;
  int64 total = 2;
}

message CreateWorkflowRequest {
  int64 tenant_id = 1;
  string name = 2;
  string description = 3;
  string trigger_type = 4;
  string config = 5;
  repeated WorkflowStepConfig steps = 6;
}

message UpdateWorkflowRequest {
  int64 id = 1;
  string name = 2;
  string description = 3;
  string trigger_type = 4;
  string config = 5;
  string status = 6;
}

message DeleteWorkflowRequest {
  int64 id = 1;
}

message WorkflowStepConfig {
  int32 step_number = 1;
  string name = 2;
  string agent_type = 3;
  string action = 4;
  string config = 5;
  int32 timeout = 6;
}

message ExecuteWorkflowRequest {
  int64 workflow_id = 1;
  int64 tenant_id = 2;
  int64 user_id = 3;
  string input = 4;
  map<string, string> context = 5;
}

message ExecuteWorkflowResponse {
  int64 execution_id = 1;
  string status = 2;
  string result = 3;
  double latency_ms = 4;
}

message WorkflowExecution {
  int64 id = 1;
  int64 workflow_id = 2;
  int64 tenant_id = 3;
  int64 user_id = 4;
  string input = 5;
  string output = 6;
  string status = 7;
  double latency_ms = 8;
  google.protobuf.Timestamp started_at = 9;
  google.protobuf.Timestamp completed_at = 10;
}

message GetWorkflowExecutionRequest {
  int64 id = 1;
}

message ListWorkflowExecutionsRequest {
  int64 workflow_id = 1;
  int32 page = 2;
  int32 per_page = 3;
}

message ListWorkflowExecutionsResponse {
  repeated WorkflowExecution executions = 1;
  int64 total = 2;
}

message WorkflowStep {
  int64 id = 1;
  int64 workflow_id = 2;
  int32 step_number = 3;
  string name = 4;
  string agent_type = 5;
  string action = 6;
  string config = 7;
  int32 timeout = 8;
  google.protobuf.Timestamp created_at = 9;
}

message GetWorkflowStepsRequest {
  int64 workflow_id = 1;
}

message ListWorkflowStepsResponse {
  repeated WorkflowStep steps = 1;
}
