syntax = "proto3";

package identity;

option go_package = "github.com/aeroxe/nexus-backend/api/proto/identity;identitypb";

import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";

// ============================================================
// Identity Service - Authentication, Users, Tenants, Roles
// ============================================================

service IdentityService {
  // Authentication
  rpc Login(LoginRequest) returns (TokenPair);
  rpc Register(RegisterRequest) returns (User);
  rpc RefreshToken(RefreshTokenRequest) returns (TokenPair);
  rpc ValidateToken(ValidateTokenRequest) returns (TokenClaims);

  // Users
  rpc GetUser(GetUserRequest) returns (User);
  rpc ListUsers(ListUsersRequest) returns (ListUsersResponse);
  rpc CreateUser(CreateUserRequest) returns (User);
  rpc UpdateUser(UpdateUserRequest) returns (User);
  rpc DeleteUser(DeleteUserRequest) returns (google.protobuf.Empty);

  // Tenants
  rpc GetTenant(GetTenantRequest) returns (Tenant);
  rpc ListTenants(ListTenantsRequest) returns (ListTenantsResponse);
  rpc CreateTenant(CreateTenantRequest) returns (Tenant);
  rpc UpdateTenant(UpdateTenantRequest) returns (Tenant);
  rpc DeleteTenant(DeleteTenantRequest) returns (google.protobuf.Empty);

  // Roles
  rpc GetRole(GetRoleRequest) returns (Role);
  rpc ListRoles(ListRolesRequest) returns (ListRolesResponse);
  rpc CreateRole(CreateRoleRequest) returns (Role);
  rpc DeleteRole(DeleteRoleRequest) returns (google.protobuf.Empty);
  rpc AssignRole(AssignRoleRequest) returns (google.protobuf.Empty);
  rpc RemoveRole(RemoveRoleRequest) returns (google.protobuf.Empty);

  // API Keys
  rpc CreateAPIKey(CreateAPIKeyRequest) returns (APIKey);
  rpc ListAPIKeys(ListAPIKeysRequest) returns (ListAPIKeysResponse);
  rpc DeleteAPIKey(DeleteAPIKeyRequest) returns (google.protobuf.Empty);
}

// ============================================================
// Messages
// ============================================================

// Authentication
message LoginRequest {
  string email = 1;
  string password = 2;
}

message RegisterRequest {
  string email = 1;
  string password = 2;
  string name = 3;
  int64 tenant_id = 4;
}

message TokenPair {
  string access_token = 1;
  string refresh_token = 2;
  int64 expires_in = 3;
  string token_type = 4;
}

message RefreshTokenRequest {
  string refresh_token = 1;
}

message ValidateTokenRequest {
  string token = 1;
}

message TokenClaims {
  int64 user_id = 1;
  int64 tenant_id = 2;
  string email = 3;
  repeated string roles = 4;
  repeated string permissions = 5;
  int64 expires_at = 6;
}

// Users
message User {
  int64 id = 1;
  int64 tenant_id = 2;
  string email = 3;
  string name = 4;
  string status = 5;
  string avatar = 6;
  google.protobuf.Timestamp last_login_at = 7;
  google.protobuf.Timestamp created_at = 8;
  google.protobuf.Timestamp updated_at = 9;
}

message GetUserRequest {
  int64 id = 1;
}

message ListUsersRequest {
  int64 tenant_id = 1;
  int32 page = 2;
  int32 per_page = 3;
}

message ListUsersResponse {
  repeated User users = 1;
  int64 total = 2;
  int32 page = 3;
  int32 per_page = 4;
}

message CreateUserRequest {
  int64 tenant_id = 1;
  string email = 2;
  string password = 3;
  string name = 4;
  repeated int64 role_ids = 5;
}

message UpdateUserRequest {
  int64 id = 1;
  string name = 2;
  string status = 3;
  string avatar = 4;
}

message DeleteUserRequest {
  int64 id = 1;
}

// Tenants
message Tenant {
  int64 id = 1;
  string name = 2;
  string slug = 3;
  string plan = 4;
  string status = 5;
  string settings = 6;
  google.protobuf.Timestamp created_at = 7;
  google.protobuf.Timestamp updated_at = 8;
}

message GetTenantRequest {
  int64 id = 1;
}

message ListTenantsRequest {
  int32 page = 1;
  int32 per_page = 2;
}

message ListTenantsResponse {
  repeated Tenant tenants = 1;
  int64 total = 2;
  int32 page = 3;
  int32 per_page = 4;
}

message CreateTenantRequest {
  string name = 1;
  string slug = 2;
  string plan = 3;
}

message UpdateTenantRequest {
  int64 id = 1;
  string name = 2;
  string plan = 3;
  string status = 4;
  string settings = 5;
}

message DeleteTenantRequest {
  int64 id = 1;
}

// Roles
message Role {
  int64 id = 1;
  int64 tenant_id = 2;
  string name = 3;
  string description = 4;
  bool is_default = 5;
  google.protobuf.Timestamp created_at = 6;
}

message GetRoleRequest {
  int64 id = 1;
}

message ListRolesRequest {
  int64 tenant_id = 1;
}

message ListRolesResponse {
  repeated Role roles = 1;
}

message CreateRoleRequest {
  int64 tenant_id = 1;
  string name = 2;
  string description = 3;
  repeated int64 permission_ids = 4;
}

message DeleteRoleRequest {
  int64 id = 1;
}

message AssignRoleRequest {
  int64 user_id = 1;
  int64 role_id = 2;
}

message RemoveRoleRequest {
  int64 user_id = 1;
  int64 role_id = 2;
}

// API Keys
message APIKey {
  int64 id = 1;
  int64 tenant_id = 2;
  int64 user_id = 3;
  string name = 4;
  string permissions = 5;
  string status = 6;
  google.protobuf.Timestamp expires_at = 7;
  google.protobuf.Timestamp last_used_at = 8;
  google.protobuf.Timestamp created_at = 9;
}

message CreateAPIKeyRequest {
  int64 tenant_id = 1;
  int64 user_id = 2;
  string name = 3;
  repeated string permissions = 4;
  int64 expires_in_seconds = 5;
}

message ListAPIKeysRequest {
  int64 tenant_id = 1;
}

message ListAPIKeysResponse {
  repeated APIKey api_keys = 1;
}

message DeleteAPIKeyRequest {
  int64 id = 1;
}
