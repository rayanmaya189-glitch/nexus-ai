syntax = "proto3";

package ai_gateway;

option go_package = "github.com/aeroxe/nexus-backend/api/proto/ai_gateway;aigatewaypb";

import "google/protobuf/timestamp.proto";

// ============================================================
// AI Gateway - Chat, Completions, Streaming
// ============================================================

service AIGatewayService {
  // Chat
  rpc Chat(ChatRequest) returns (ChatResponse);
  rpc ChatStream(stream ChatRequest) returns (stream StreamChunk);
  rpc GetSession(GetSessionRequest) returns (AISession);
  rpc ListSessions(ListSessionsRequest) returns (ListSessionsResponse);

  // Completions
  rpc Complete(CompletionRequest) returns (CompletionResponse);

  // Models
  rpc ListModels(google.protobuf.Empty) returns (ListModelsResponse);
  rpc GetModel(GetModelRequest) returns (AIModel);

  // Health
  rpc HealthCheck(google.protobuf.Empty) returns (HealthResponse);
}

// ============================================================
// Messages
// ============================================================

message ChatMessage {
  string role = 1;
  string content = 2;
}

message ChatRequest {
  repeated ChatMessage messages = 1;
  string model = 2;
  bool stream = 3;
  double temperature = 4;
  int32 max_tokens = 5;
  string agent_id = 6;
  string session_id = 7;
  int64 tenant_id = 8;
  int64 user_id = 9;
}

message ChatResponse {
  string id = 1;
  string content = 2;
  string model = 3;
  repeated ChatMessage messages = 4;
  TokenUsage tokens = 5;
  double latency_ms = 6;
  string created_at = 7;
}

message TokenUsage {
  int32 prompt_tokens = 1;
  int32 completion_tokens = 2;
  int32 total_tokens = 3;
}

message StreamChunk {
  string delta = 1;
  bool finished = 2;
  string model = 3;
  TokenUsage tokens = 4;
}

message AISession {
  string id = 1;
  int64 tenant_id = 2;
  int64 user_id = 3;
  string agent_id = 4;
  string model = 5;
  string status = 6;
  google.protobuf.Timestamp created_at = 7;
}

message GetSessionRequest {
  string id = 1;
}

message ListSessionsRequest {
  int64 tenant_id = 1;
  int32 page = 2;
  int32 per_page = 3;
}

message ListSessionsResponse {
  repeated AISession sessions = 1;
  int64 total = 2;
}

message CompletionRequest {
  string prompt = 1;
  string model = 2;
  double temperature = 3;
  int32 max_tokens = 4;
  string system_prompt = 5;
}

message CompletionResponse {
  string id = 1;
  string content = 2;
  string model = 3;
  TokenUsage tokens = 4;
  double latency_ms = 5;
}

message AIModel {
  string id = 1;
  string name = 2;
  string model_id = 3;
  string category = 4;
  int64 size_bytes = 5;
  string parameters = 6;
  int32 context_length = 7;
  string capabilities = 8;
  string status = 9;
}

message GetModelRequest {
  string id = 1;
}

message ListModelsResponse {
  repeated AIModel models = 1;
}

message HealthResponse {
  string status = 1;
  string ollama_status = 2;
  repeated string available_models = 3;
}
