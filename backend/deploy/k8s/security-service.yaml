apiVersion: apps/v1
kind: Deployment
metadata:
  name: security-ai
  namespace: nexus-ai
  labels:
    app: security-ai
spec:
  replicas: 2
  selector:
    matchLabels:
      app: security-ai
  template:
    metadata:
      labels:
        app: security-ai
    spec:
      containers:
        - name: security-ai
          image: nexus-rust/security-ai:latest
          ports:
            - containerPort: 8104
          env:
            - name: DATABASE_URL
              value: "postgres://nexus:nexus_secret_2026@postgres:5432/nexus_main"
            - name: OLLAMA_BASE_URL
              value: "http://ollama:11434"
          readinessProbe:
            httpGet:
              path: /health
              port: 8104
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "1000m"
---
apiVersion: v1
kind: Service
metadata:
  name: security-ai
  namespace: nexus-ai
spec:
  selector:
    app: security-ai
  ports:
    - port: 8104
      targetPort: 8104
  type: ClusterIP
