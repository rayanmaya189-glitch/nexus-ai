apiVersion: apps/v1
kind: Deployment
metadata:
  name: security-service
  namespace: nexus-ai
  labels:
    app: security-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: security-service
  template:
    metadata:
      labels:
        app: security-service
    spec:
      containers:
        - name: security-service
          image: nexus-go/security-service:latest
          ports:
            - containerPort: 8094
          env:
            - name: PORT
              value: "8094"
          readinessProbe:
            httpGet:
              path: /health
              port: 8094
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: security-service
  namespace: nexus-ai
spec:
  selector:
    app: security-service
  ports:
    - port: 8094
      targetPort: 8094
  type: ClusterIP
