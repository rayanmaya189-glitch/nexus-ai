apiVersion: apps/v1
kind: Deployment
metadata:
  name: workflow-service
  namespace: nexus-ai
  labels:
    app: workflow-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: workflow-service
  template:
    metadata:
      labels:
        app: workflow-service
    spec:
      containers:
        - name: workflow-service
          image: nexus-go/workflow-service:latest
          ports:
            - containerPort: 8084
          env:
            - name: PORT
              value: "8084"
            - name: DB_HOST
              value: "postgres"
            - name: DB_PORT
              value: "5432"
            - name: DB_USER
              value: "nexus"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nexus-secrets
                  key: db-password
            - name: DB_NAME
              value: "nexus_main"
            - name: DB_SSLMODE
              value: "disable"
          readinessProbe:
            httpGet:
              path: /health
              port: 8084
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: workflow-service
  namespace: nexus-ai
spec:
  selector:
    app: workflow-service
  ports:
    - port: 8084
      targetPort: 8084
  type: ClusterIP
