apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-service
  namespace: nexus-ai
  labels:
    app: rag-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: rag-service
  template:
    metadata:
      labels:
        app: rag-service
    spec:
      containers:
        - name: rag-service
          image: nexus-rust/rag-service:latest
          ports:
            - containerPort: 8101
          env:
            - name: DATABASE_URL
              value: "postgres://nexus:nexus_secret_2026@postgres:5432/nexus_main"
            - name: REDIS_URL
              value: "redis://redis:6379"
          readinessProbe:
            httpGet:
              path: /health
              port: 8101
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "1000m"
---
apiVersion: v1
kind: Service
metadata:
  name: rag-service
  namespace: nexus-ai
spec:
  selector:
    app: rag-service
  ports:
    - port: 8101
      targetPort: 8101
  type: ClusterIP
