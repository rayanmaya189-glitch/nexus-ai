apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-orchestrator
  namespace: nexus-ai
  labels:
    app: agent-orchestrator
spec:
  replicas: 2
  selector:
    matchLabels:
      app: agent-orchestrator
  template:
    metadata:
      labels:
        app: agent-orchestrator
    spec:
      containers:
        - name: agent-orchestrator
          image: nexus-rust/agent-orchestrator:latest
          ports:
            - containerPort: 8100
          env:
            - name: DATABASE_URL
              value: "postgres://nexus:nexus_secret_2026@postgres:5432/nexus_main"
            - name: REDIS_URL
              value: "redis://redis:6379"
            - name: NATS_URL
              value: "nats://nats:4222"
            - name: OLLAMA_BASE_URL
              value: "http://ollama:11434"
          readinessProbe:
            httpGet:
              path: /health
              port: 8100
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "1000m"
---
apiVersion: v1
kind: Service
metadata:
  name: agent-orchestrator
  namespace: nexus-ai
spec:
  selector:
    app: agent-orchestrator
  ports:
    - port: 8100
      targetPort: 8100
  type: ClusterIP
