apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-gateway
  namespace: nexus-ai
  labels:
    app: ai-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-gateway
  template:
    metadata:
      labels:
        app: ai-gateway
    spec:
      containers:
        - name: ai-gateway
          image: nexus-go/ai-gateway:latest
          ports:
            - containerPort: 8082
          env:
            - name: PORT
              value: "8082"
            - name: OLLAMA_BASE_URL
              value: "http://ollama:11434"
          readinessProbe:
            httpGet:
              path: /health
              port: 8082
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: ai-gateway
  namespace: nexus-ai
spec:
  selector:
    app: ai-gateway
  ports:
    - port: 8082
      targetPort: 8082
  type: ClusterIP
