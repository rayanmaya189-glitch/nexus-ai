apiVersion: apps/v1
kind: Deployment
metadata:
  name: vision-service
  namespace: nexus-ai
  labels:
    app: vision-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: vision-service
  template:
    metadata:
      labels:
        app: vision-service
    spec:
      containers:
        - name: vision-service
          image: nexus-rust/vision-service:latest
          ports:
            - containerPort: 8102
          env:
            - name: DATABASE_URL
              value: "postgres://nexus:nexus_secret_2026@postgres:5432/nexus_main"
            - name: OLLAMA_BASE_URL
              value: "http://ollama:11434"
          readinessProbe:
            httpGet:
              path: /health
              port: 8102
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "1000m"
---
apiVersion: v1
kind: Service
metadata:
  name: vision-service
  namespace: nexus-ai
spec:
  selector:
    app: vision-service
  ports:
    - port: 8102
      targetPort: 8102
  type: ClusterIP
