apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: nexus-ai
  labels:
    app: api-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: nexus-go/api-gateway:latest
          ports:
            - containerPort: 8000
          env:
            - name: PORT
              value: "8000"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: nexus-secrets
                  key: jwt-secret
            - name: IDENTITY_SERVICE_URL
              value: "http://identity-service:8081"
            - name: AI_GATEWAY_URL
              value: "http://ai-gateway:8082"
            - name: WORKFLOW_SERVICE_URL
              value: "http://workflow-service:8084"
            - name: AUDIT_SERVICE_URL
              value: "http://audit-service:8085"
            - name: MODEL_REGISTRY_URL
              value: "http://model-registry:8086"
            - name: NOTIFICATION_SERVICE_URL
              value: "http://notification-service:8087"
            - name: CONFIGURATION_SERVICE_URL
              value: "http://configuration-service:8088"
            - name: ECOSYSTEM_SERVICE_URL
              value: "http://ecosystem-service:8089"
            - name: SQL_AGENT_SERVICE_URL
              value: "http://sql-agent-service:8090"
            - name: MEMORY_SERVICE_URL
              value: "http://memory-service:8091"
            - name: VISION_SERVICE_URL
              value: "http://vision-service:8092"
            - name: RAG_SERVICE_URL
              value: "http://rag-service:8093"
            - name: SECURITY_SERVICE_URL
              value: "http://security-service:8094"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: nexus-ai
spec:
  selector:
    app: api-gateway
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: api-gateway
  namespace: nexus-ai
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
    - host: nexus.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 8000
