apiVersion: apps/v1
kind: Deployment
metadata:
  name: model-registry
  namespace: nexus-ai
  labels:
    app: model-registry
spec:
  replicas: 2
  selector:
    matchLabels:
      app: model-registry
  template:
    metadata:
      labels:
        app: model-registry
    spec:
      containers:
        - name: model-registry
          image: nexus-go/model-registry:latest
          ports:
            - containerPort: 8086
          env:
            - name: PORT
              value: "8086"
            - name: DB_HOST
              value: "postgres"
            - name: DB_PORT
              value: "5432"
            - name: DB_USER
              value: "nexus"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nexus-secrets
                  key: db-password
            - name: DB_NAME
              value: "nexus_main"
            - name: DB_SSLMODE
              value: "disable"
          readinessProbe:
            httpGet:
              path: /health
              port: 8086
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: model-registry
  namespace: nexus-ai
spec:
  selector:
    app: model-registry
  ports:
    - port: 8086
      targetPort: 8086
  type: ClusterIP
