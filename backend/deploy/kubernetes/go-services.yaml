apiVersion: apps/v1
kind: Deployment
metadata:
  name: identity-service
  namespace: nexus-ai
spec:
  replicas: 2
  selector:
    matchLabels:
      app: identity-service
  template:
    metadata:
      labels:
        app: identity-service
    spec:
      containers:
        - name: identity-service
          image: nexus-identity-service:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: nexus-config
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: identity-service
  namespace: nexus-ai
spec:
  selector:
    app: identity-service
  ports:
    - port: 80
      targetPort: 8080
---
