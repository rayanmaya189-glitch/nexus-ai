# ═══════════════════════════════════════════════════════════════════
# AeroXe Nexus AI — Rust Microservice Deployments (Supporting)
# ═══════════════════════════════════════════════════════════════════
# All services are written in Rust with SeaORM.
# gRPC port: 50051  |  HTTP health: 8080
# ═══════════════════════════════════════════════════════════════════

# ── Identity Service ─────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: identity-service
  namespace: nexus-ai
  labels:
    app: identity-service
    language: rust
    orm: seaorm
spec:
  replicas: 2
  selector:
    matchLabels:
      app: identity-service
  template:
    metadata:
      labels:
        app: identity-service
        language: rust
    spec:
      containers:
        - name: identity-service
          image: nexus-identity-service:latest
          ports:
            - name: grpc
              containerPort: 50051
              protocol: TCP
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: nexus-config
          env:
            - name: DATABASE_URL
              value: "postgres://nexus:$(POSTGRES_PASSWORD)@postgres:5432/nexus_identity"
            - name: GRPC_ADDR
              value: "0.0.0.0:50051"
            - name: HTTP_ADDR
              value: "0.0.0.0:8080"
            - name: NATS_URL
              value: "nats://nats:4222"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          livenessProbe:
            grpc:
              port: 50051
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            grpc:
              port: 50051
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: identity-service
  namespace: nexus-ai
spec:
  selector:
    app: identity-service
  ports:
    - name: grpc
      port: 50051
      targetPort: 50051
    - name: http
      port: 80
      targetPort: 8080
  type: ClusterIP

