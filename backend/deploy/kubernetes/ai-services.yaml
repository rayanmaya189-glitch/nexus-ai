apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-gateway
  namespace: nexus-ai
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-gateway
  template:
    metadata:
      labels:
        app: ai-gateway
    spec:
      containers:
        - name: ai-gateway
          image: nexus-ai-gateway:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: nexus-config
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: ai-gateway
  namespace: nexus-ai
spec:
  selector:
    app: ai-gateway
  ports:
    - port: 80
      targetPort: 8080
---
