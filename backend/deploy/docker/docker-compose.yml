version: "3.8"

services:
  # ── Infrastructure ──────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: nexus-postgres
    environment:
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: nexus_secret_2026
      POSTGRES_DB: nexus_main
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus -d nexus_main"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: nexus-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2-alpine
    container_name: nexus-nats
    ports:
      - "4222:4222"
      - "8222:8222"
    command: ["--http_port", "8222"]

  elasticsearch:
    image: elasticsearch:8.13.0
    container_name: nexus-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data

  minio:
    image: minio/minio
    container_name: nexus-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  ollama:
    image: ollama/ollama:latest
    container_name: nexus-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  # ── Go Services ─────────────────────────────────────────────────
  api-gateway:
    build:
      context: ../go
      dockerfile: deploy/docker/Dockerfile.service
      args:
        SERVICE: api-gateway
    container_name: nexus-api-gateway
    ports:
      - "8000:8000"
    environment:
      PORT: "8000"
      JWT_SECRET: nexus-jwt-secret-2026
      IDENTITY_SERVICE_URL: http://identity-service:8081
      AI_GATEWAY_URL: http://ai-gateway:8082
      WORKFLOW_SERVICE_URL: http://workflow-service:8084
      AUDIT_SERVICE_URL: http://audit-service:8085
      MODEL_REGISTRY_URL: http://model-registry:8086
      NOTIFICATION_SERVICE_URL: http://notification-service:8087
      CONFIGURATION_SERVICE_URL: http://configuration-service:8088
      ECOSYSTEM_SERVICE_URL: http://ecosystem-service:8089
      SQL_AGENT_SERVICE_URL: http://sql-agent-service:8090
      MEMORY_SERVICE_URL: http://memory-service:8091
      VISION_SERVICE_URL: http://vision-service:8092
      RAG_SERVICE_URL: http://rag-service:8093
      SECURITY_SERVICE_URL: http://security-service:8094
    depends_on:
      - identity-service
      - ai-gateway

  identity-service:
    build:
      context: ../go
      dockerfile: deploy/docker/Dockerfile.service
      args:
        SERVICE: identity-service
    container_name: nexus-identity-service
    ports:
      - "8081:8081"
    environment:
      PORT: "8081"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: nexus
      DB_PASSWORD: nexus_secret_2026
      DB_NAME: nexus_main
      DB_SSLMODE: disable
      JWT_SECRET: nexus-jwt-secret-2026
    depends_on:
      postgres:
        condition: service_healthy

  ai-gateway:
    build:
      context: ../go
      dockerfile: deploy/docker/Dockerfile.service
      args:
        SERVICE: ai-gateway
    container_name: nexus-ai-gateway
    ports:
      - "8082:8082"
    environment:
      PORT: "8082"
      OLLAMA_BASE_URL: http://ollama:11434
    depends_on:
      - ollama

  workflow-service:
    build:
      context: ../go
      dockerfile: deploy/docker/Dockerfile.service
      args:
        SERVICE: workflow-service
    container_name: nexus-workflow-service
    ports:
      - "8084:8084"
    environment:
      PORT: "8084"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: nexus
      DB_PASSWORD: nexus_secret_2026
      DB_NAME: nexus_main
      DB_SSLMODE: disable
    depends_on:
      postgres:
        condition: service_healthy

  audit-service:
    build:
      context: ../go
      dockerfile: deploy/docker/Dockerfile.service
      args:
        SERVICE: audit-service
    container_name: nexus-audit-service
    ports:
      - "8085:8085"
    environment:
      PORT: "8085"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: nexus
      DB_PASSWORD: nexus_secret_2026
      DB_NAME: nexus_main
      DB_SSLMODE: disable
    depends_on:
      postgres:
        condition: service_healthy

  model-registry:
    build:
      context: ../go
      dockerfile: deploy/docker/Dockerfile.service
      args:
        SERVICE: model-registry
    container_name: nexus-model-registry
    ports:
      - "8086:8086"
    environment:
      PORT: "8086"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: nexus
      DB_PASSWORD: nexus_secret_2026
      DB_NAME: nexus_main
      DB_SSLMODE: disable
    depends_on:
      postgres:
        condition: service_healthy

  notification-service:
    build:
      context: ../go
      dockerfile: deploy/docker/Dockerfile.service
      args:
        SERVICE: notification-service
    container_name: nexus-notification-service
    ports:
      - "8087:8087"
    environment:
      PORT: "8087"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: nexus
      DB_PASSWORD: nexus_secret_2026
      DB_NAME: nexus_main
      DB_SSLMODE: disable
    depends_on:
      postgres:
        condition: service_healthy

  configuration-service:
    build:
      context: ../go
      dockerfile: deploy/docker/Dockerfile.service
      args:
        SERVICE: configuration-service
    container_name: nexus-configuration-service
    ports:
      - "8088:8088"
    environment:
      PORT: "8088"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: nexus
      DB_PASSWORD: nexus_secret_2026
      DB_NAME: nexus_main
      DB_SSLMODE: disable
    depends_on:
      postgres:
        condition: service_healthy

  ecosystem-service:
    build:
      context: ../go
      dockerfile: deploy/docker/Dockerfile.service
      args:
        SERVICE: ecosystem-service
    container_name: nexus-ecosystem-service
    ports:
      - "8089:8089"
    environment:
      PORT: "8089"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: nexus
      DB_PASSWORD: nexus_secret_2026
      DB_NAME: nexus_main
      DB_SSLMODE: disable
    depends_on:
      postgres:
        condition: service_healthy

  sql-agent-service:
    build:
      context: ../go
      dockerfile: deploy/docker/Dockerfile.service
      args:
        SERVICE: sql-agent-service
    container_name: nexus-sql-agent-service
    ports:
      - "8090:8090"
    environment:
      PORT: "8090"
      OLLAMA_BASE_URL: http://ollama:11434
    depends_on:
      - ollama

  memory-service:
    build:
      context: ../go
      dockerfile: deploy/docker/Dockerfile.service
      args:
        SERVICE: memory-service
    container_name: nexus-memory-service
    ports:
      - "8091:8091"
    environment:
      PORT: "8091"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: nexus
      DB_PASSWORD: nexus_secret_2026
      DB_NAME: nexus_main
      DB_SSLMODE: disable
    depends_on:
      postgres:
        condition: service_healthy

  vision-service:
    build:
      context: ../go
      dockerfile: deploy/docker/Dockerfile.service
      args:
        SERVICE: vision-service
    container_name: nexus-vision-service
    ports:
      - "8092:8092"
    environment:
      PORT: "8092"
      OLLAMA_BASE_URL: http://ollama:11434
    depends_on:
      - ollama

  rag-service:
    build:
      context: ../go
      dockerfile: deploy/docker/Dockerfile.service
      args:
        SERVICE: rag-service
    container_name: nexus-rag-service
    ports:
      - "8093:8093"
    environment:
      PORT: "8093"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: nexus
      DB_PASSWORD: nexus_secret_2026
      DB_NAME: nexus_main
      DB_SSLMODE: disable
    depends_on:
      postgres:
        condition: service_healthy

  security-service:
    build:
      context: ../go
      dockerfile: deploy/docker/Dockerfile.service
      args:
        SERVICE: security-service
    container_name: nexus-security-service
    ports:
      - "8094:8094"
    environment:
      PORT: "8094"

  # ── Rust Services ───────────────────────────────────────────────
  agent-orchestrator:
    image: nexus-rust/agent-orchestrator:latest
    container_name: nexus-agent-orchestrator
    ports:
      - "8100:8100"
    environment:
      DATABASE_URL: postgres://nexus:nexus_secret_2026@postgres:5432/nexus_main
      REDIS_URL: redis://redis:6379
      NATS_URL: nats://nats:4222
      OLLAMA_BASE_URL: http://ollama:11434
    depends_on:
      - postgres
      - redis
      - nats

  rag-service-rs:
    image: nexus-rust/rag-service:latest
    container_name: nexus-rag-service-rs
    ports:
      - "8101:8101"
    environment:
      DATABASE_URL: postgres://nexus:nexus_secret_2026@postgres:5432/nexus_main
      REDIS_URL: redis://redis:6379
    depends_on:
      - postgres
      - redis

  vision-service-rs:
    image: nexus-rust/vision-service:latest
    container_name: nexus-vision-service-rs
    ports:
      - "8102:8102"
    environment:
      DATABASE_URL: postgres://nexus:nexus_secret_2026@postgres:5432/nexus_main
      OLLAMA_BASE_URL: http://ollama:11434
    depends_on:
      - postgres
      - ollama

  memory-service-rs:
    image: nexus-rust/memory-service:latest
    container_name: nexus-memory-service-rs
    ports:
      - "8103:8103"
    environment:
      DATABASE_URL: postgres://nexus:nexus_secret_2026@postgres:5432/nexus_main
      REDIS_URL: redis://redis:6379
    depends_on:
      - postgres
      - redis

  security-ai:
    image: nexus-rust/security-ai:latest
    container_name: nexus-security-ai
    ports:
      - "8104:8104"
    environment:
      DATABASE_URL: postgres://nexus:nexus_secret_2026@postgres:5432/nexus_main
      OLLAMA_BASE_URL: http://ollama:11434
    depends_on:
      - postgres
      - ollama

volumes:
  postgres_data:
  redis_data:
  es_data:
  minio_data:
  ollama_data:
