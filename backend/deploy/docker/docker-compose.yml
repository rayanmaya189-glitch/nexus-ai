version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg18
    container_name: nexus-postgres
    environment:
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: nexus_secret_2026
      POSTGRES_DB: nexus_main
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nexus-network

  redis:
    image: redis:7-alpine
    container_name: nexus-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nexus-network

  nats:
    image: nats:2.10-alpine
    container_name: nexus-nats
    ports:
      - "4222:4222"
      - "8222:8222"
    command: "--jetstream --store_dir /data"
    volumes:
      - nats_data:/data
    networks:
      - nexus-network

  minio:
    image: minio/minio:latest
    container_name: nexus-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: nexus_minio
      MINIO_ROOT_PASSWORD: nexus_minio_secret
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - nexus-network

  elasticsearch:
    image: elasticsearch:8.14.0
    container_name: nexus-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - nexus-network

  ollama:
    image: ollama/ollama:latest
    container_name: nexus-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - nexus-network

  # ===== Go Services =====

  identity-service:
    build:
      context: ../../go
      dockerfile: deploy/docker/Dockerfile.identity
    container_name: nexus-identity
    ports:
      - "8081:8080"
    environment:
      PORT: "8080"
      CONFIG_PATH: "/app/configs/identity-service.json"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - nexus-network

  api-gateway:
    build:
      context: ../../go
      dockerfile: deploy/docker/Dockerfile.api-gateway
    container_name: nexus-api-gateway
    ports:
      - "8000:8080"
    environment:
      PORT: "8080"
    depends_on:
      - identity-service
      - ai-gateway
      - agent-orchestrator
    networks:
      - nexus-network

  ai-gateway:
    build:
      context: ../../go
      dockerfile: deploy/docker/Dockerfile.service
    container_name: nexus-ai-gateway
    ports:
      - "8082:8080"
    environment:
      PORT: "8080"
      OLLAMA_BASE_URL: "http://ollama:11434"
    depends_on:
      - ollama
    networks:
      - nexus-network

  workflow-service:
    build:
      context: ../../go
      dockerfile: deploy/docker/Dockerfile.service
    container_name: nexus-workflow
    ports:
      - "8084:8080"
    environment:
      PORT: "8080"
      SERVICE: "workflow-service"
    networks:
      - nexus-network

  audit-service:
    build:
      context: ../../go
      dockerfile: deploy/docker/Dockerfile.service
    container_name: nexus-audit
    ports:
      - "8085:8080"
    environment:
      PORT: "8080"
      SERVICE: "audit-service"
    depends_on:
      - postgres
    networks:
      - nexus-network

  model-registry:
    build:
      context: ../../go
      dockerfile: deploy/docker/Dockerfile.service
    container_name: nexus-model-registry
    ports:
      - "8086:8080"
    environment:
      PORT: "8080"
      SERVICE: "model-registry"
    depends_on:
      - ollama
    networks:
      - nexus-network

  notification-service:
    build:
      context: ../../go
      dockerfile: deploy/docker/Dockerfile.service
    container_name: nexus-notification
    ports:
      - "8087:8080"
    environment:
      PORT: "8080"
      SERVICE: "notification-service"
    networks:
      - nexus-network

  configuration-service:
    build:
      context: ../../go
      dockerfile: deploy/docker/Dockerfile.service
    container_name: nexus-configuration
    ports:
      - "8088:8080"
    environment:
      PORT: "8080"
      SERVICE: "configuration-service"
    networks:
      - nexus-network

  ecosystem-service:
    build:
      context: ../../go
      dockerfile: deploy/docker/Dockerfile.service
    container_name: nexus-ecosystem
    ports:
      - "8089:8080"
    environment:
      PORT: "8080"
      SERVICE: "ecosystem-service"
    networks:
      - nexus-network

  sql-agent-service:
    build:
      context: ../../go
      dockerfile: deploy/docker/Dockerfile.service
    container_name: nexus-sql-agent
    ports:
      - "8090:8080"
    environment:
      PORT: "8080"
      SERVICE: "sql-agent-service"
    networks:
      - nexus-network

  # ===== Rust Services =====

  agent-orchestrator:
    build:
      context: ../../rust
      dockerfile: deploy/docker/Dockerfile.agent-orchestrator
    container_name: nexus-agent-orchestrator
    ports:
      - "8091:8080"
    environment:
      PORT: "8080"
      CONFIG_PATH: "/app/configs/agent-orchestrator.json"
    depends_on:
      - ollama
      - redis
    networks:
      - nexus-network

  rag-service:
    build:
      context: ../../rust
      dockerfile: deploy/docker/Dockerfile.rag-service
    container_name: nexus-rag
    ports:
      - "8092:8080"
    environment:
      PORT: "8080"
      CONFIG_PATH: "/app/configs/rag-service.json"
    depends_on:
      - ollama
      - postgres
    networks:
      - nexus-network

  vision-service:
    build:
      context: ../../rust
      dockerfile: deploy/docker/Dockerfile.vision-service
    container_name: nexus-vision
    ports:
      - "8093:8080"
    environment:
      PORT: "8080"
      CONFIG_PATH: "/app/configs/vision-service.json"
    depends_on:
      - ollama
    networks:
      - nexus-network

  memory-service:
    build:
      context: ../../rust
      dockerfile: deploy/docker/Dockerfile.memory-service
    container_name: nexus-memory
    ports:
      - "8094:8080"
    environment:
      PORT: "8080"
      CONFIG_PATH: "/app/configs/memory-service.json"
    depends_on:
      - redis
    networks:
      - nexus-network

  security-ai:
    build:
      context: ../../rust
      dockerfile: deploy/docker/Dockerfile.security-ai
    container_name: nexus-security-ai
    ports:
      - "8095:8080"
    environment:
      PORT: "8080"
      CONFIG_PATH: "/app/configs/security-ai.json"
    networks:
      - nexus-network

volumes:
  postgres_data:
  redis_data:
  nats_data:
  minio_data:
  es_data:
  ollama_data:

networks:
  nexus-network:
    driver: bridge
