version: "3.8"

services:
  # ── Infrastructure ──────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: nexus-postgres
    environment:
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: nexus_secret_2026
      POSTGRES_DB: nexus_main
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus -d nexus_main"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: nexus-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2-alpine
    container_name: nexus-nats
    ports:
      - "4222:4222"
      - "8222:8222"
    command: ["--http_port", "8222"]

  elasticsearch:
    image: elasticsearch:8.13.0
    container_name: nexus-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data

  minio:
    image: minio/minio
    container_name: nexus-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  ollama:
    image: ollama/ollama:latest
    container_name: nexus-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  # ── Rust Services ───────────────────────────────────────────────
  agent-orchestrator:
    build:
      context: ../rust
      dockerfile: services/agent-orchestrator/Dockerfile
    container_name: nexus-agent-orchestrator
    ports:
      - "8100:8100"
    environment:
      DATABASE_URL: postgres://nexus:nexus_secret_2026@postgres:5432/nexus_main
      REDIS_URL: redis://redis:6379
      NATS_URL: nats://nats:4222
      OLLAMA_BASE_URL: http://ollama:11434
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_started
      ollama:
        condition: service_started

  rag-service:
    build:
      context: ../rust
      dockerfile: services/rag-service/Dockerfile
    container_name: nexus-rag-service
    ports:
      - "8101:8101"
    environment:
      DATABASE_URL: postgres://nexus:nexus_secret_2026@postgres:5432/nexus_main
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  vision-service:
    build:
      context: ../rust
      dockerfile: services/vision-service/Dockerfile
    container_name: nexus-vision-service
    ports:
      - "8102:8102"
    environment:
      DATABASE_URL: postgres://nexus:nexus_secret_2026@postgres:5432/nexus_main
      OLLAMA_BASE_URL: http://ollama:11434
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started

  memory-service:
    build:
      context: ../rust
      dockerfile: services/memory-service/Dockerfile
    container_name: nexus-memory-service
    ports:
      - "8103:8103"
    environment:
      DATABASE_URL: postgres://nexus:nexus_secret_2026@postgres:5432/nexus_main
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  security-ai:
    build:
      context: ../rust
      dockerfile: services/security-ai/Dockerfile
    container_name: nexus-security-ai
    ports:
      - "8104:8104"
    environment:
      DATABASE_URL: postgres://nexus:nexus_secret_2026@postgres:5432/nexus_main
      OLLAMA_BASE_URL: http://ollama:11434
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started

volumes:
  postgres_data:
  redis_data:
  es_data:
  minio_data:
  ollama_data:
